// Конфиг плагина "Server Access Control" автора "mx?! / BlackSignature" (файл плагина "server_access_control.amxx")

// Доступ на сервер по AMXX-флагам
// "" - Не проверять по AMXX-флагам
// "~" - Свободный вход (пускать всех)
// Другое значение - пускать при наличии указанных AMXX-флагов
// -
// Default: ""
// sac_amxx_access_flags ""

// При значении "0" требуется наличие любого из AMXX-флагов, иначе требуется наличие всех AMXX-флагов
// -
// Default: "0"
sac_amxx_access_mode "0"

// Доступ на сервер по услуге GameCMS
// "" - Не проверять по услуге GameCMS
// Внимание, название услуги ВСЕГДА начинается с символа "_", пример: "_myaccess"
// Внимание, для работы данной функции требуется запущенный плагин "GameCMS API"
// -
// Default: ""
sac_gamecms_priv ""